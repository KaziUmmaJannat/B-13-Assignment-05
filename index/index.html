<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <!-- <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />-->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../Style/style.css"> 
</head>
<body>


<div class="w-11/12 mx-auto p-10 mt-20">
    <fieldset class=" border-base-300 rounded-box w-100 mx-auto border shadow-xl p-4">
   
        <div class="logo">
        <img src="../assets/github-logo.png" alt="GitHub Logo">
        <h2 class="text-[20px] font-bold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p></div>

        <label class="label font-bold text-[16px] text-black">Username</label>
        <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
        <p class="text-[#4A00FF]">Default: admin</p>

        <label class="label font-bold text-[16px] text-black">Password</label>
        <input id="password" type="password" class="input w-full" placeholder="Enter Password" />
        <p class="text-[#4A00FF]">Default: admin123</p>

        <button onclick="signin()" class="btn btn-neutral mt-4 bg-blue-600 text-[#FFFF] w-full">Sign In</button>
        <h2 class="text-center font-medium py-2">OR</h2>
     
        <p class="text-[#64748B] text-center py-2">Demo Credentials:</p>
        <div class="text-center bg-slate-100 py-4">
            <h2><span class="font-bold text-[15px]">Username:</span> <span class="font-medium">admin</span></h2>
            <h2><span class="font-bold text-[15px]">Password:</span> <span class="font-medium">admin123</span></h2>
        </div>
    </fieldset>
</div>

  <script src="../script/script.js"></script>
  
</body>
</html>
