<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../Style/style.css">
</head>
<body>

<header class="w-full fixed top-0 left-0">
<div class="navbar bg-slate-50 shadow-sm flex justify-between">
    <div class="flex items-center">
    <img src="../assets/github-logo.png" alt="" class="w-8 h-8">
    <a class="text-lg">GitHub Issue Tracker</a>
    </div>
    <div class="flex gap-2">
       <input type="text" placeholder="Search Issue..." class="input input-bordered w-30 md:w-auto" />
       <!-- <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i> </div>
       <div class="dropdown dropdown-end"> -->
       <div>
       <button class="btn btn-soft btn-primary">
        + New Issue</button>
      </div>
      </div>
</div>
</header>

<section class="w-11/12 mx-auto mt-25 p-5 bg-white shadow-lg border rounded-lg">
    <button id="all-btn" class="btn btn-soft btn-primary">All</button>
    <button id="open-btn"class="btn btn-soft btn-primary">Open</button>
    <button id="closed-btn" class="btn btn-soft btn-primary">Closed</button>
</section>


    <section class="w-11/12 mx-auto mt-5 flex justify-between items-center shadow-lg rounded-lg p-5 border">
        <div class="left-side flex items-center gap-1">
            <div>
                <img src="../assets/Aperture.png" alt="">
            </div>
            <div>
                <p id="banner-p" class="font-bold ">50 Issues</p>
                <p class="text-slate-400">Track and manage your project issues</p>
            </div>

        </div>

        <div class="right-side flex items-center gap-4">
            <div class="flex items-center gap-1">
                <img src="../assets/Open-Status.png" alt="">
                <p>Open</p>
            </div>

            <div class="flex items-center gap-1">
                <img src="../assets/Closed- Status .png" alt="">
                <p>Close</p>
            </div>

        </div>

    </section>


 <section id="card-container" class="w-11/12 mx-auto mt-5 shadow-lg p-5 grid grid-cols-4 gap-4 bg-white">
        <div  class="bg-white rounded-sm shadow-md p-4 border-t-4 border-t-green-600">

           <div class="flex justify-between">
            <img src="../assets/Open-Status.png" alt="">
           <button class="btn btn-soft btn-primary bg-red-200 text-red-500 rounded-full text-xs">HIGH</button>
           </div>

           <div class="py-2">
            <h2 class="font-bold text-[15px]">Fix navigation menu on mobile devices</h2>
            <p class="text-slate-400 text-[10px]">The navigation menu doesn't collapse properly on mobile devices...</p>
            </div>

            <div class="flex justify-between py-2 gap-1">
                <button class="btn btn-xs bg-red-200 text-red-500 rounded-full border-0 text-[10px]"><i class="fa-solid fa-bug"></i> BUG</button>
                <button class="btn btn-xs bg-orange-200 text-orange-400 rounded-full border-0 text-[7px]"><i class="fa-regular fa-life-ring"></i> HELP WANTED</button>
            </div>
            
            <div class="text-gray-400 border-t pt-2 text-[12px]">
            <p>#1 by john_doe</p>
            <p>1/15/2024</p>
            </div>
        </div>
 </section>


    <script src="../script/dashboard.js"></script>
</body>
</html>
